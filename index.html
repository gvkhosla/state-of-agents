<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>State of Agents</title>
    <meta
      name="description"
      content="State of Agents is a forthcoming research report on models, agents, work, and society."
    />
    <meta name="theme-color" content="#080b0f" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>

    <main class="page">
      <header class="nav">
        <a class="brand" href="/" aria-label="State of Agents home">
          <svg class="logo" viewBox="0 0 64 64" aria-hidden="true">
            <path class="logo-ring" d="M32 8 56 32 32 56 8 32Z" />
            <path class="logo-ring inner" d="M32 18 46 32 32 46 18 32Z" />
            <path class="logo-axis" d="M18 32h28M32 18v28" />
            <circle class="logo-dot" cx="32" cy="32" r="3" />
          </svg>
          <span>State of Agents</span>
        </a>
        <span class="nav-note">2026</span>
      </header>

      <section class="hero" aria-label="Intro">
        <p class="kicker">Forthcoming research</p>
        <h1>State<br />of Agents</h1>
        <p class="dek">Models. Agents. Work. Society.</p>

        <form class="signup" aria-label="Get the report">
          <label class="sr-only" for="email">Email address</label>
          <input id="email" type="email" placeholder="email" autocomplete="email" required />
          <button type="submit">Notify me</button>
        </form>
      </section>

      <section class="artifact" aria-label="Research artifact">
        <div class="artifact-card">
          <p>AI STACK / FIELD NOTES</p>
          <ol>
            <li><span>01</span>Compute</li>
            <li><span>02</span>Models</li>
            <li><span>03</span>Agents</li>
            <li><span>04</span>Applications</li>
            <li><span>05</span>Society</li>
          </ol>
        </div>
        <div class="question-card">
          <p>What works?</p>
          <p>Who benefits?</p>
          <p>What changes?</p>
        </div>
      </section>

      <footer>
        <p>Independent research by Geet Khosla.</p>
        <p>stateofagents.org</p>
      </footer>
    </main>

    <script>
      const form = document.querySelector('.signup');
      form?.addEventListener('submit', (event) => {
        event.preventDefault();
        const button = form.querySelector('button');
        button.textContent = 'Recorded';
        button.disabled = true;
      });
    </script>
  </body>
</html>
