<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>State of Agents</title>
    <meta name="description" content="A forthcoming report on models, agents, work, and society." />
    <meta name="theme-color" content="#05070a" />
    <link rel="canonical" href="https://stateofagents.org" />
    <meta property="og:title" content="State of Agents" />
    <meta property="og:description" content="Models. Agents. Work. Society." />
    <meta property="og:url" content="https://stateofagents.org" />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <div class="glow" aria-hidden="true"></div>

    <main class="shell">
      <header class="nav">
        <a class="brand" href="/" aria-label="State of Agents">
          <svg class="mark" viewBox="0 0 48 48" aria-hidden="true">
            <rect x="7" y="7" width="34" height="34" rx="2" />
            <path d="M15 31h18M15 24h18M15 17h18" />
            <circle cx="33" cy="24" r="3" />
          </svg>
          <span>State of Agents</span>
        </a>
        <span class="year">2026</span>
      </header>

      <section class="hero">
        <div class="copy">
          <p class="eyebrow">Forthcoming report</p>
          <h1>State of<br />Agents</h1>
          <p class="line">Models. Agents. Work. Society.</p>

          <form class="signup" aria-label="Get notified">
            <label class="sr-only" for="email">Email address</label>
            <input id="email" name="email" type="email" placeholder="email" autocomplete="email" required />
            <button type="submit">Notify</button>
          </form>
        </div>

        <div class="object" aria-label="Five-layer AI stack">
          <div class="plate plate-1"><span>Compute</span></div>
          <div class="plate plate-2"><span>Models</span></div>
          <div class="plate plate-3"><span>Agents</span></div>
          <div class="plate plate-4"><span>Apps</span></div>
          <div class="plate plate-5"><span>Society</span></div>
          <div class="core" aria-hidden="true"></div>
        </div>
      </section>

      <section class="questions" aria-label="Research questions">
        <p>What works?</p>
        <p>Who benefits?</p>
        <p>What changes?</p>
      </section>

      <footer>
        <span>Independent research by Geet Khosla.</span>
        <span>stateofagents.org</span>
      </footer>
    </main>

    <script>
      const form = document.querySelector('.signup');
      form?.addEventListener('submit', (event) => {
        event.preventDefault();
        const button = form.querySelector('button');
        button.textContent = 'Saved';
        button.disabled = true;
      });
    </script>
  </body>
</html>
