<!doctype html>
<html lang="en" class="scheme-only-dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>State of Agents</title>
    <meta name="description" content="State of Agents — coming soon." />
    <meta name="theme-color" content="#111111" />
    <link rel="canonical" href="https://stateofagents.org" />
    <meta property="og:title" content="State of Agents" />
    <meta property="og:description" content="State of Agents — coming soon." />
    <meta property="og:url" content="https://stateofagents.org" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://stateofagents.org/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://stateofagents.org/og-image.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="field" aria-hidden="true"></canvas>

    <main class="page" aria-labelledby="title">
      <section class="coming-soon">
        <h1 id="title">STATE OF AGENTS</h1>
        <p>coming soon.</p>
      </section>
    </main>

    <script>
      const canvas = document.querySelector('#field');
      const context = canvas.getContext('2d');
      const state = { width: 0, height: 0, ratio: 1, stars: [] };

      const random = (min, max) => Math.random() * (max - min) + min;

      function resize() {
        state.ratio = Math.min(window.devicePixelRatio || 1, 2);
        state.width = window.innerWidth;
        state.height = window.innerHeight;
        canvas.width = Math.floor(state.width * state.ratio);
        canvas.height = Math.floor(state.height * state.ratio);
        canvas.style.width = `${state.width}px`;
        canvas.style.height = `${state.height}px`;
        context.setTransform(state.ratio, 0, 0, state.ratio, 0, 0);

        const count = Math.floor((state.width * state.height) / 9500);
        state.stars = Array.from({ length: count }, () => ({
          x: Math.random() * state.width,
          y: Math.random() * state.height,
          r: random(0.35, 1.15),
          a: random(0.16, 0.72),
          p: random(0, Math.PI * 2),
          s: random(0.00025, 0.0008),
        }));
      }

      function draw(time) {
        const { width, height, stars } = state;
        context.clearRect(0, 0, width, height);

        const gradient = context.createRadialGradient(width * 0.5, height * 0.42, 0, width * 0.5, height * 0.42, Math.max(width, height) * 0.78);
        gradient.addColorStop(0, '#252525');
        gradient.addColorStop(0.55, '#181818');
        gradient.addColorStop(1, '#0d0d0d');
        context.fillStyle = gradient;
        context.fillRect(0, 0, width, height);

        context.save();
        context.globalCompositeOperation = 'screen';
        for (const star of stars) {
          const twinkle = 0.55 + Math.sin(time * star.s + star.p) * 0.45;
          context.globalAlpha = star.a * twinkle;
          context.fillStyle = '#f4f1e8';
          context.beginPath();
          context.arc(star.x, star.y, star.r, 0, Math.PI * 2);
          context.fill();
        }
        context.restore();

        context.save();
        context.globalAlpha = 0.18;
        context.strokeStyle = '#d8d2c2';
        context.lineWidth = 1;
        const base = height * 0.72;
        for (let line = 0; line < 14; line++) {
          const y = base + line * height * 0.025;
          context.beginPath();
          for (let x = -40; x <= width + 40; x += 14) {
            const wave = Math.sin(x * 0.008 + time * 0.00018 + line * 0.7) * 12;
            const slow = Math.sin(x * 0.002 + time * 0.00008 + line) * 22;
            const pointY = y + wave + slow + Math.sin((x + line * 71) * 0.021) * 3;
            if (x === -40) context.moveTo(x, pointY);
            else context.lineTo(x, pointY);
          }
          context.stroke();
        }
        context.restore();

        requestAnimationFrame(draw);
      }

      resize();
      window.addEventListener('resize', resize);
      requestAnimationFrame(draw);
    </script>
  </body>
</html>
